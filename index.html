<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>PULSE</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
</head>
<body>

  <script>
    // Force PULSE branding and neon theme
    function forcePulse() {
      // Add big PULSE header if not present
      if (!document.querySelector('.pulse-header')) {
        const header = document.createElement('div');
        header.className = 'pulse-header';
        header.innerHTML = `
          <h1>PULSE</h1>
          <p>Nearby guys • Instant chat • Right now</p>
        `;
        document.body.insertAdjacentElement('afterbegin', header);
      }

      // Force dark neon theme
      document.body.style.background = '#0a0a0a';
      document.body.style.color = '#ffffff';

      // Style cards and profiles
      document.querySelectorAll('div, section, .card, .profile, [class*="card"], [class*="profile"]').forEach(el => {
        if (el.children.length > 0 || el.textContent.trim().length > 10) {
          el.style.background = '#1a1a1a';
          el.style.border = '2px solid #00f0ff';
          el.style.boxShadow = '0 0 30px rgba(195, 0, 255, 0.6)';
          el.style.borderRadius = '16px';
        }
      });

      // Style headings
      document.querySelectorAll('h1, h2, .title, .header, strong').forEach(h => {
        h.style.color = '#00f0ff';
        h.style.textShadow = '0 0 25px #c300ff';
      });

      // Style buttons
      document.querySelectorAll('button, .btn, .accent, [role="button"]').forEach(btn => {
        btn.style.background = 'linear-gradient(90deg, #00f0ff, #c300ff)';
        btn.style.color = 'white';
        btn.style.border = 'none';
      });

      // Hide old MEATEOR / Grinder text
      document.querySelectorAll('h1, h2, .title, .header').forEach(el => {
        if (el.textContent.includes('MEATEOR') || el.textContent.includes('Grinder')) {
          el.style.display = 'none';
        }
      });

      console.log('PULSE forced successfully');
    }

    // Run immediately and repeatedly
    forcePulse();
    setTimeout(forcePulse, 500);
    setTimeout(forcePulse, 1500);
    setTimeout(forcePulse, 3000);
    setTimeout(forcePulse, 5000);

    // Run on user interaction
    document.addEventListener('click', forcePulse);
    document.addEventListener('scroll', forcePulse);
  </script>

</body>
</html>
